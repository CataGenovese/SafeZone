services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://localhost:8080
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: npm run dev -- -H 0.0.0.0 -p 3000
    networks:
      - safezone-net

networks:
  safezone-net:
    driver: bridge

volumes:
  frontend_node_modules:
  frontend_next:
